<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Promedio</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>Calculadora de Promedio</h1>

<form id="form-materia">

<input
type="text"
name="nombre"
placeholder="Nombre de la materia"
required>

<input
type="number"
name="nota"
step="0.1"
min="0"
max="10"
placeholder="Nota"
required>

<input
type="number"
name="peso"
min="1"
max="100"
placeholder="Porcentaje"
required>

<button>

Agregar

</button>

</form>

<br>

<table>

<thead>

<tr>

<th>Materia</th>

<th>Nota</th>

<th>Peso</th>

<th>Acción</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

<h2>

Promedio:
<span id="resultado">

0.00

</span>

</h2>

<h2 id="estado">

Sin datos

</h2>

<script src="app.js"></script>

</body>

</html>
